events { worker_connections 1024; }

http {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://www.burgergov.com; frame-ancestors 'none';" always;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
    # Strict zone for authentication + authenticated proxy surfaces (P1-1).
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    # Tight zone for unauthenticated public write endpoints (P1-1).
    limit_req_zone $binary_remote_addr zone=public_write:10m rate=20r/m;

    # Only emit "Connection: upgrade" for genuine websocket requests. An empty
    # Upgrade header maps to "close", which removes the h2c-smuggling vector of
    # blindly forwarding the upgrade headers on every request (P3-2 semgrep).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name burgergov.com www.burgergov.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://www.burgergov.com$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name burgergov.com www.burgergov.com;

        ssl_certificate     /etc/letsencrypt/live/burgergov.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/burgergov.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Redirect bare domain to www
        if ($host = burgergov.com) {
            return 301 https://www.burgergov.com$request_uri;
        }

        # Next.js owns its own /api routes. Login + authenticated proxies get the
        # strict login zone so credential stuffing / brute force is throttled (P1-1).
        location /api/auth/ {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://burger_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/proxy/ {
            limit_req zone=login burst=20 nodelay;
            proxy_pass http://burger_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/vendor/ {
            limit_req zone=login burst=20 nodelay;
            proxy_pass http://burger_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Public FastAPI endpoints — the ONLY paths exposed directly to the backend.
        #    Admin/vendor backend routes must go through /api/proxy or /api/vendor (above)
        #    and are no longer reachable from the public internet (ENTERPRISE_AUDIT P0-3).
        location = /api/vendors/register {
            limit_req zone=public_write burst=10 nodelay;
            proxy_pass http://hermes_backend:8000/api/vendors/register;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/quote/ {
            limit_req zone=public_write burst=10 nodelay;
            proxy_pass http://hermes_backend:8000/api/quote/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/outreach/optout/ {
            limit_req zone=public_write burst=10 nodelay;
            proxy_pass http://hermes_backend:8000/api/outreach/optout/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Any other /api/* not matched above (admin/vendor backend routes, probes) is
        # refused at the edge rather than forwarded to the backend.
        location /api/ {
            return 404;
        }

        location /health {
            proxy_pass http://hermes_backend:8000/health;
        }

        # All other traffic → Next.js
        location / {
            proxy_pass http://burger_frontend:3000;
            # h2c-smuggling is mitigated by the $connection_upgrade map above:
            # a request without an Upgrade header gets Connection: close, so the
            # upgrade headers are not blindly forwarded. The rule can't see the
            # map, so suppress its static match (anchored on the next line).
            # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }
    }
}
