events { worker_connections 1024; }

http {
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ─── HTTP → redirect to HTTPS (active once SSL is provisioned) ───────────
    server {
        listen 80;
        server_name burgergov.com www.burgergov.com;

        # Let's Encrypt ACME challenge passthrough
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Once SSL is live, swap this block for: return 301 https://www.burgergov.com$request_uri;
        # Until then, serve the app on HTTP so smoke tests pass before cert issuance
        location / {
            proxy_pass http://burger_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # Next.js owns /api/auth/ and /api/proxy/ — these must NOT go to FastAPI
        location /api/auth/ {
            proxy_pass http://burger_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/proxy/ {
            proxy_pass http://burger_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other /api/ calls go to FastAPI (vendor portal public endpoints)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://hermes_backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://hermes_backend:8000/health;
        }
    }

    # ─── HTTPS (uncomment after certbot provisions the certificate) ─────────
    # server {
    #     listen 443 ssl http2;
    #     server_name burgergov.com www.burgergov.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/burgergov.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/burgergov.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Same location blocks as the HTTP server above
    #     location / { ... }
    #     location /api/auth/ { ... }
    #     location /api/proxy/ { ... }
    #     location /api/ { ... }
    #     location /health { ... }
    # }
}
