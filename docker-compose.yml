services:
  db:
    image: pgvector/pgvector:pg16
    container_name: hermes_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - hermes_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: hermes_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hermes_net

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_COMPANY_NAME: ${NEXT_PUBLIC_COMPANY_NAME}
        NEXT_PUBLIC_COMPANY_EIN: ${NEXT_PUBLIC_COMPANY_EIN}
        NEXT_PUBLIC_DOMAIN: ${NEXT_PUBLIC_DOMAIN}
    container_name: burger_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      AUTH_TRUST_HOST: "true"
    expose:
      - "3000"
    depends_on:
      - backend
      - db
    networks:
      - hermes_net

  nginx:
    image: nginx:1.27-alpine
    container_name: hermes_nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - hermes_net

  certbot-renew:
    image: docker:27-cli
    container_name: certbot_cron
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "echo '0 3 1,15 * * docker run --rm
      -v /home/t_burgernyc/nginx/certbot/conf:/etc/letsencrypt
      -v /home/t_burgernyc/nginx/certbot/www:/var/www/certbot
      certbot/certbot renew --quiet --webroot -w /var/www/certbot
      && docker restart hermes_nginx' | crontab -
      && crond -f -l 8"

networks:
  hermes_net:
    driver: bridge

volumes:
  db_data:
