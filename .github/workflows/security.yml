name: security

# Security + quality gates (ENTERPRISE_AUDIT P3-2). Run on every PR and on pushes
# to main so a regression can't merge silently. workflow_dispatch allows manual
# re-runs (e.g. after a billing lock clears) without needing a new push.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci
        env:
          SEMGREP_RULES: "p/default p/security-audit p/secrets"

  python-deps:
    name: pip-audit (backend deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r apps/backend/requirements.txt

  node-deps-and-build:
    name: npm audit + lint + build (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://www.burgergov.com
